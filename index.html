<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Arakap Personalizados</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" href="logo.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg,#2b3292,#0149b4);
      color: white;
      text-align: center;
      padding: 30px;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .container {
      flex: 1;
    }

    .botao {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
      background: white;
      color: black;
      text-decoration: none;
      margin: 12px auto;
      padding: 12px;
      padding-left: 20px;
      border-radius: 30px; 
      width: 75%;
      max-width: 260px; /* Comprimento reduzido aqui */
      font-weight: 400; 
      font-size: 14px;
      letter-spacing: 0.5px;
      transition: 0.3s ease;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .botao i {
      font-size: 18px;
      width: 25px;
      text-align: center;
    }

    .fa-whatsapp { color: #25D366; }
    .fa-instagram { color: #E4405F; }
    .fa-facebook { color: #1877F2; }
    .fa-store { color: #FF8C00; }
    .fa-map-marker-alt { color: #EA4335; }

    .logo-container {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .botao:hover {
      background: #f8f8f8;
      transform: translateY(-3px);
      box-shadow: 0 6px 12px rgba(0,0,0,0.15);
    }

    footer {
      margin-top: 40px;
      padding: 20px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.6);
      line-height: 1.6;
      font-weight: 400;
    }
    
    footer strong {
        font-weight: 600;
        color: rgba(255, 255, 255, 0.8);
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="logo-container">
      <img src="logo.png" alt="Arakap" class="logo">
    </div>

    <a class="botao" href="https://api.whatsapp.com/send/?phone=558299260730" target="_blank">
      <i class="fab fa-whatsapp"></i> Fale no WhatsApp
    </a>
    
    <a class="botao" href="https://facebook.com/arakappersonalizados" target="_blank">
      <i class="fab fa-facebook"></i> Facebook
    </a>
    
    <a class="botao" href="https://instagram.com/arakappersonalizados" target="_blank">
      <i class="fab fa-instagram"></i> Instagram
    </a>
    
    <a class="botao" href="https://wa.me/c/558299260730" target="_blank">
      <i class="fas fa-store"></i> Catálogo
    </a>
    
    <a class="botao" href="https://maps.app.goo.gl/EN44UnHEKoyBe6wY6" target="_blank">
      <i class="fas fa-map-marker-alt"></i> Localização
    </a>
  </div>

  <footer>
    <strong>Arakap Personalizados</strong><br>
    Rua Bela Vista, 1019 - Bairro: Brasília - Arapiraca/AL<br>
    © 2026 Todos os direitos reservados.
  </footer>

</body>
</html>
