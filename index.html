<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Arakap Personalizados</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg,#2b3292,#0149b4);
      color: white;
      text-align: center;
      padding: 30px;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      margin-bottom: 30px;
      color: #ccc;
    }

    .botao {
      display: block;
      background: white;
      color: black;
      text-decoration: none;
      margin: 10px auto;
      padding: 15px;
      border-radius: 10px;
      width: 80%;
      max-width: 300px;
      font-weight: bold;
      transition: 0.3s;
    }

    /* Espaço do ícone */
.botao i {
  margin-right: 10px;
}

/* Cores oficiais */
.fa-whatsapp {
  color: #25D366;
}

.fa-instagram {
  color: #E4405F;
}

.fa-facebook {
  color: #1877F2;
}

/* Extras */
.fa-store {
  color: #FF8C00; /* laranja (catálogo) */
}

.fa-map-marker-alt {
  color: #EA4335; /* vermelho estilo Google Maps */
}

    .logo-container {
  text-align: center;
  margin-bottom: 15px;
}

.logo {
  width: 120px;
  height: 120px;
  border-radius: 50%;      /* 👈 deixa redonda */
  object-fit: cover;       /* 👈 evita deformar */
  border: 3px solid white; /* 👈 borda bonita */
}
  

    .botao {
  display: flex;
  align-items: center;
  justify-content: flex-start; /* muda aqui */
  gap: 10px;
  padding-left: 20px;
    }

    .botao i {
      margin-right: 10px;
      font-size: 18px;
    }

    .botao:hover {
      background: #25D366;
      color: white;
    }
  </style>
</head>

<body>

  <div class="logo-container">
  <img src="logo.png" alt="Arakap" class="logo">
  </div>

  <a class="botao" href="https://api.whatsapp.com/send/?phone=558299260730&text&type=phone_number&app_absent=0&wame_ctl=1" target="_blank">
  <i class="fab fa-whatsapp"></i> Fale no WhatsApp</a>
  <a class="botao" href="https://facebook.com/arakappersonalizados" target="_blank">
  <i class="fab fa-facebook"></i> Facebook</a>
  <a class="botao" href="https://instagram.com/arakappersonalizados" target="_blank">
  <i class="fab fa-instagram"></i> Instagram</a>
  <a class="botao" href="https://wa.me/c/558299260730" target="_blank">
  <i class="fas fa-store"></i> Catálogo</a>
  <a class="botao" href="https://maps.app.goo.gl/EN44UnHEKoyBe6wY6" target="_blank">
  <i class="fas fa-map-marker-alt"></i> Localização</a>

</body>
</html>
